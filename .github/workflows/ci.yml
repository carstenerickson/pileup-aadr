name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref when a newer push arrives
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run pytest
        run: pytest -v

  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff check
        run: ruff check .

      - name: mypy
        run: mypy pileup_aadr

  bio-tools:
    name: bio-tools integration (Picard + samtools + pileupCaller + mosdepth)
    # Catches the smoke-test class of bug (Picard --version regex,
    # CompletedProcess.pid, scientific-notation parser drift) BEFORE they need
    # to be re-discovered manually on a GCP instance. Real binaries via bioconda;
    # extract end-to-end against a tiny chr22 fixture.
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}  # `-l` so conda env activation persists across steps
    steps:
      - uses: actions/checkout@v4

      - name: Set up miniconda + bioconda channel
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.12"
          channels: bioconda,conda-forge
          channel-priority: flexible

      - name: Install bio tools
        # Versions are floor-pinned (matches PILEUP_AADR's min_version specs)
        # rather than exact-pinned to keep conda's solver tractable across
        # bioconda's evolving package graph. The bio-tools job's purpose is
        # to catch the smoke-test class of bug — which any compatible
        # version mix will surface.
        run: |
          # `pip` is installed explicitly: the bioconda solve can land a python
          # build without ensurepip, so a later `python -m pip install` fails with
          # "No module named pip" unless pip is pulled into the env here.
          conda install -y -c bioconda -c conda-forge \
            pip \
            'samtools>=1.16' \
            'sequencetools>=1.6.0' \
            'picard>=3.0' \
            'mosdepth>=0.3.6'
          # bioconda's `picard` wrapper drops the JAR at $CONDA_PREFIX/share/picard-*/picard.jar
          PICARD_JAR=$(ls "$CONDA_PREFIX"/share/picard-*/picard.jar | head -n1)
          echo "PICARD_JAR=$PICARD_JAR" >> "$GITHUB_ENV"

      - name: Cache hg38 chr22 fixture
        uses: actions/cache@v4
        with:
          path: tests/integration/fixtures/chr22.fa*
          key: hg38-chr22-fasta-v1

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run integration tests
        # `--run-slow` stand-in: the test_extract_end_to_end is marked slow but
        # bio-tools is the dedicated job for it, so include slow.
        run: pytest tests/integration/ -v -m "slow or not slow"
